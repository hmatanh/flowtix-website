<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background: site-grade dark with subtle blue radial -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#0a1530" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#040404" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.05)"/>
    </pattern>
  </defs>

  <!-- Layered backgrounds -->
  <rect width="1200" height="630" fill="#050505"/>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Soft blue halo -->
  <ellipse cx="600" cy="230" rx="520" ry="180" fill="rgba(59,130,246,0.08)"/>

  <!-- Eyebrow chip -->
  <g transform="translate(490 130)">
    <rect x="0" y="0" width="220" height="38" rx="19" fill="#080808" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="22" cy="19" r="4" fill="#3B82F6"/>
    <text x="40" y="24" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#cccccc" letter-spacing="2.4">DIGITAL SYSTEMS STUDIO</text>
  </g>

  <!-- Logo mark (concentric arc - matches Logo.tsx grammar) -->
  <g transform="translate(600 240)">
    <path d="M -48 8 L -16 -28 L 16 -28 L 48 8 L 16 8 L 0 -12 L -16 8 Z" fill="#ffffff" stroke="none"/>
  </g>

  <!-- Wordmark + tagline -->
  <text x="600" y="345" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="84" font-weight="900" fill="#ffffff" letter-spacing="-3.5">flowtix<tspan font-size="36" font-weight="500" fill="#888888" dy="-12">.ai</tspan></text>

  <text x="600" y="425" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="32" font-weight="600" fill="#cccccc" letter-spacing="-0.8">Custom systems, automations &amp; AI workflows.</text>

  <text x="600" y="470" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#888888">Built around your business - not the other way around.</text>

  <!-- Footer rail -->
  <g transform="translate(0 560)">
    <rect x="0" y="0" width="1200" height="1" fill="#1a1a1a"/>
    <text x="60" y="32" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#666666" letter-spacing="2.8">FLOWTIX.AI</text>
    <text x="1140" y="32" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#666666" letter-spacing="2.8">OFFICE@FLOWTIX.AI</text>
  </g>
</svg>
